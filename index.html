<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Support Case Verification Portal</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; color:#333;}
        header {background:#1a2b4c; color:white; padding:20px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .container {max-width:800px; margin:40px auto; background:white; padding:40px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.1); text-align:center;}
        .logo img {max-width:250px; height:auto;}
        input {padding:15px; width:320px; font-size:18px; border:2px solid #1a2b4c; border-radius:5px; text-align:center;}
        button {padding:15px 40px; background:#1a2b4c; color:white; border:none; border-radius:5px; font-size:18px; cursor:pointer; margin:20px 10px;}
        button:hover {background:#2c4a7a;}
        .status {margin:30px 0; font-size:18px; min-height:60px;}
        .loading {display:none; margin:20px auto; border:5px solid #f3f3f3; border-top:5px solid #1a2b4c; border-radius:50%; width:60px; height:60px; animation:spin 1s linear infinite;}
        @keyframes spin {0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}
        footer {background:#1a2b4c; color:white; text-align:center; padding:15px; position:fixed; bottom:0; width:100%; font-size:14px;}
        .result {display:none; margin:30px 0; padding:25px; background:#e8f5e9; border-radius:8px; border-left:6px solid #4caf50;}
    </style>
</head>
<body>
    <header><h1>Apple Support Case Verification portal</h1><p>Secure Access Portal - Authorized Personnel Only</p></header>
    
    <div class="container">
        <div class="logo"><img src="719C3727-4C2B-4FDF-AFCB-428E64B0CE20.png" alt="Official Logo" onerror="this.src='https://via.placeholder.com/250x120?text=DEPARTMENT+LOGO';"></div>
        <h2>Enter Case ID</h2>
        <input type="text" id="caseId" placeholder="e.g. 676767 or 787878" maxlength="10">
        <br>
        <button onclick="startVerification()">Start Verification</button>
        
        <div class="status" id="status"></div>
        <div class="loading" id="loader"></div>
        
        <div class="result" id="result">
            <h3 id="resultText"></h3>
            <p id="dateInfo"></p>
            <button onclick="proceedNext()">Proceed Next →</button>
        </div>
    </div>
    
    <footer><p>© 2026 Apple</p><p>Confidential • Do Not Share</p></footer>

    <script>
        let currentCaseId = '';
        function getRedmondDate() {
            return new Date().toLocaleString('en-US', {
                timeZone: 'America/Los_Angeles',
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }) + ' (Cupertino,CA)';
        }
        
        function startVerification() {
            const cid = document.getElementById('caseId').value.trim();
            const status = document.getElementById('status');
            if (!cid) {
                status.innerHTML = '<span style="color:red;">Enter your Case ID first</span>';
                return;
            }
            currentCaseId = cid;
            status.textContent = `Verifying Case ID ${cid}... Please Wait....`;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultText').textContent = `1 search found for Case ID ${cid}`;
                document.getElementById('dateInfo').textContent = `Date: ${getRedmondDate()}`;
                document.getElementById('result').style.display = 'block';
                status.innerHTML = '';
            }, 30000);
        }
        
        function proceedNext() {
            document.getElementById('status').innerHTML = ' Please Wait...';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            setTimeout(() => {
                if (currentCaseId === '556221') {
                    window.location.href = 'james.html';
                } else if (currentCaseId === '997204') {
                    window.location.href = 'rody.html';
                } else {
                    document.getElementById('status').innerHTML = '<span style="color:red;">No page for this ID. Use correct Case IDs.</span>';
                    document.getElementById('loader').style.display = 'none';
                }
            }, 5000);
        }
    </script>
</body>
</html>
